name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    name: build & typecheck (${{ matrix.os }} / node ${{ matrix.node }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: [20, 22]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm run lint

      - name: Build
        run: pnpm run build

      # TODO(F0): enable once vitest is wired (plan/12-testing-ci)
      # - name: Test
      #   run: pnpm run test

  golden:
    name: golden test (validate CMO = PASS)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout cli
        uses: actions/checkout@v4
        with:
          path: cli

      # The golden persona lives in the sibling spec repo. Checked out side-by-side
      # so the relative path used by CLAUDE.md (../persona.md) resolves in CI too.
      - name: Checkout persona.md spec
        uses: actions/checkout@v4
        with:
          repository: personaxis/persona.md
          path: persona.md
        continue-on-error: true

      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: cli/pnpm-lock.yaml

      - name: Install & build
        working-directory: cli
        run: |
          pnpm install --frozen-lockfile
          pnpm run build

      - name: Validate golden CMO persona (must exit 0 = PASS)
        working-directory: cli
        run: |
          if [ -f ../persona.md/.personaxis/personas/cmo/personaxis.md ]; then
            node dist/index.js validate ../persona.md/.personaxis/personas/cmo/personaxis.md
          else
            echo "::warning::sibling persona.md repo not available; skipping golden validate"
          fi
