name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    name: build & typecheck (${{ matrix.os }} / node ${{ matrix.node }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: [20, 22]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm run lint

      - name: Build
        run: pnpm run build

      - name: Test
        run: pnpm run test

  golden:
    name: golden test (validate CMO = PASS)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout cli
        uses: actions/checkout@v4
        with:
          path: cli

      # The golden persona lives in the sibling spec repo. Checked out side-by-side
      # so the relative path used by CLAUDE.md (../persona.md) resolves in CI too.
      - name: Checkout persona.md spec
        uses: actions/checkout@v4
        with:
          repository: personaxis/persona.md
          path: persona.md
        continue-on-error: true

      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: cli/pnpm-lock.yaml

      - name: Install & build
        working-directory: cli
        run: |
          pnpm install --frozen-lockfile
          pnpm run build

      - name: Validate golden CMO persona (must exit 0 = PASS)
        working-directory: cli
        run: |
          if [ -f ../persona.md/.personaxis/personas/cmo/personaxis.md ]; then
            node packages/cli/dist/index.js validate ../persona.md/.personaxis/personas/cmo/personaxis.md
          else
            echo "::warning::sibling persona.md repo not available; skipping golden validate"
          fi

      # Byte-identity rule (CLAUDE.md): schemas AND templates must match persona.md.
      # Blocking — drift is a spec-conformance regression.
      - name: Enforce schema + template byte-identity with persona.md
        if: ${{ hashFiles('persona.md/schema/persona.schema.json') != '' }}
        working-directory: cli
        run: |
          fail=0
          check() { if ! diff -q "$1" "$2" >/dev/null; then echo "::error::$1 differs from $2 (byte-identity rule)"; fail=1; fi; }
          check packages/cli/schema/persona.schema.json ../persona.md/schema/persona.schema.json
          check packages/cli/schema/policy.schema.json  ../persona.md/schema/policy.schema.json
          check packages/cli/schema/state.schema.json   ../persona.md/schema/state.schema.json
          check packages/cli/schema/memory.schema.json  ../persona.md/schema/memory.schema.json
          check packages/cli/templates/personaxis_template.md ../persona.md/.personaxis/personaxis_template.md
          check packages/cli/templates/PERSONA_template.md     ../persona.md/PERSONA_template.md
          check packages/cli/templates/policy_template.yaml    ../persona.md/.personaxis/policy_template.yaml
          exit $fail

  evals:
    name: governance evals (deterministic, no API keys)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install & build
        run: |
          pnpm install --frozen-lockfile
          pnpm run build

      # Proves the governance invariants hold (clamp, gate, drift cap, episodic
      # honoring, tamper-evidence, injection block, budget stop, verification).
      # A regression fails the suite (non-zero exit) and blocks the PR.
      - name: Run governance eval suite
        run: node packages/evals/dist/index.js --out eval-report.md --markdown

      - name: Upload eval report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-report
          path: eval-report.md
