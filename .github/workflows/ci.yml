name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    name: build & typecheck (${{ matrix.os }} / node ${{ matrix.node }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: [20, 22]
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      # Build first: each package's `tsc --noEmit` typecheck resolves its workspace
      # deps through their emitted dist/*.d.ts, which only exist after a build.
      - name: Build
        run: pnpm run build

      - name: Typecheck
        run: pnpm run lint

  # The behavioral suite (unit + fast-check property + filesystem session tests)
  # runs once on a single fast, stable runner. Spreading it across the OS matrix
  # added no real signal but plenty of flake: Windows temp-dir cleanup races
  # (ENOTEMPTY) and vitest worker-RPC ("onTaskUpdate") timeouts on slow runners.
  # Cross-platform safety is still covered by build + typecheck across the full
  # matrix above; the heavy adversarial proof lives in the research E3 runner.
  test:
    name: test suite (ubuntu / node 22)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install & build
        run: |
          pnpm install --frozen-lockfile
          pnpm run build
      - name: Test
        run: pnpm run test
        env:
          # Per-push regression gate (5x the local default of 200). The core suite
          # uses the forks pool (packages/core/vitest.config.ts) so this stays clear
          # of the worker-RPC timeout even under the property suites.
          FC_NUM_RUNS: "300"

  golden:
    name: golden test (validate CMO = PASS)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout cli
        uses: actions/checkout@v7
        with:
          path: cli

      # The golden persona lives in the sibling spec repo. Checked out side-by-side
      # so the relative path used by CLAUDE.md (../persona.md) resolves in CI too.
      - name: Checkout persona.md spec
        uses: actions/checkout@v7
        with:
          repository: personaxis/persona.md
          path: persona.md
        continue-on-error: true

      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: cli/pnpm-lock.yaml

      - name: Install & build
        working-directory: cli
        run: |
          pnpm install --frozen-lockfile
          pnpm run build

      - name: Validate golden CMO persona (must exit 0 = PASS)
        working-directory: cli
        run: |
          if [ -f ../persona.md/.personaxis/personas/cmo/personaxis.md ]; then
            node packages/cli/dist/index.js validate ../persona.md/.personaxis/personas/cmo/personaxis.md
          else
            echo "::warning::sibling persona.md repo not available; skipping golden validate"
          fi

      # Byte-identity rule (CLAUDE.md): schemas AND templates must match persona.md.
      # Blocking, drift is a spec-conformance regression. `check-mirror` owns the
      # file list (scripts/sync-spec-mirror.mjs) so this gate never drifts from the
      # `sync-mirror` command contributors run locally. A missing sibling is a skip.
      - name: Enforce schema + template byte-identity with persona.md
        if: ${{ hashFiles('persona.md/schema/persona.schema.json') != '' }}
        working-directory: cli
        run: pnpm run check-mirror

  evals:
    name: governance evals (deterministic, no API keys)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install & build
        run: |
          pnpm install --frozen-lockfile
          pnpm run build

      # Proves the governance invariants hold (clamp, gate, drift cap, episodic
      # honoring, tamper-evidence, injection block, budget stop, verification).
      # A regression fails the suite (non-zero exit) and blocks the PR.
      - name: Run governance eval suite
        run: node packages/evals/dist/index.js --out eval-report.md --markdown

      - name: Upload eval report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-report
          path: eval-report.md
